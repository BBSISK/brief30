<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Brief — Your life in 30 words{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink:       #1a1612;
            --paper:     #f5f0e8;
            --warm:      #e8dfd0;
            --accent:    #c45c2a;
            --muted:     #8a7f72;
            --faint:     #d4c9b8;
            --serif:     'Cormorant Garamond', Georgia, serif;
            --mono:      'DM Mono', monospace;
        }

        html { font-size: 18px; }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: var(--serif);
            font-weight: 300;
            min-height: 100vh;
            /* Subtle paper texture */
            background-image:
                radial-gradient(ellipse at 20% 80%, rgba(196,92,42,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(26,22,18,0.03) 0%, transparent 60%);
        }

        /* ── Layout ── */
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
        }

        /* ── Nav ── */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--faint);
            padding-bottom: 1.5rem;
            margin-bottom: 4rem;
        }

        .wordmark {
            font-family: var(--serif);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink);
            text-decoration: none;
        }

        .wordmark span {
            color: var(--accent);
        }

        nav a {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        nav a:hover { color: var(--accent); }

        /* ── Typography ── */
        h1 {
            font-family: var(--serif);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }

        h1 em {
            font-style: italic;
            color: var(--accent);
        }

        h2 {
            font-family: var(--serif);
            font-size: 1.4rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
        }

        p {
            line-height: 1.8;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .label {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Form ── */
        .field { margin-bottom: 1.5rem; }

        .field label {
            display: block;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--faint);
            padding: 0.5rem 0;
            font-family: var(--serif);
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-bottom-color: var(--accent);
        }

        textarea {
            resize: none;
            min-height: 120px;
            line-height: 1.8;
        }

        .word-counter {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--muted);
            text-align: right;
            margin-top: 0.4rem;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        .word-counter.at-limit { color: var(--accent); }
        .word-counter.over-limit { color: #c0392b; }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.75rem 2rem;
            border: 1px solid var(--ink);
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }

        .btn:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .btn-accent {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-accent:hover {
            background: var(--accent);
            color: var(--paper);
        }

        .btn-ghost {
            border-color: var(--faint);
            color: var(--muted);
        }

        .btn-ghost:hover {
            background: var(--faint);
            color: var(--ink);
        }

        /* ── Error ── */
        .error {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: #c0392b;
            letter-spacing: 0.05em;
            padding: 0.75rem 0;
            border-left: 2px solid #c0392b;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        /* ── Entry display ── */
        .entry-text {
            font-family: var(--serif);
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            font-weight: 300;
            font-style: italic;
            line-height: 1.9;
            color: var(--ink);
            padding: 2rem 0;
            border-top: 1px solid var(--faint);
            border-bottom: 1px solid var(--faint);
            margin: 2rem 0;
        }

        /* ── Snapshot timeline ── */
        .timeline { margin-top: 3rem; }

        .timeline-header {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .snapshot {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--faint);
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 1.5rem;
            align-start: top;
        }

        .snapshot-date {
            font-family: var(--mono);
            font-size: 0.58rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            padding-top: 0.2rem;
            line-height: 1.6;
        }

        .snapshot-entry {
            font-family: var(--serif);
            font-size: 1rem;
            font-style: italic;
            line-height: 1.8;
            color: var(--ink);
        }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid var(--faint);
            margin: 3rem 0;
        }

        /* ── Claim link box ── */
        .claim-box {
            background: var(--warm);
            border: 1px solid var(--faint);
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .claim-box .claim-url {
            font-family: var(--mono);
            font-size: 0.65rem;
            word-break: break-all;
            color: var(--accent);
            margin: 0.75rem 0;
            line-height: 1.6;
        }

        /* ── Animations ── */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Username availability ── */
        .username-status {
            font-family: var(--mono);
            font-size: 0.58rem;
            letter-spacing: 0.1em;
            margin-top: 0.4rem;
            min-height: 1rem;
        }

        .username-status.available { color: #2d7a4f; }
        .username-status.taken     { color: #c0392b; }
        .username-status.checking  { color: var(--muted); }

        /* ── Mood picker ── */
        .mood-option { display: none; }

        .mood-label {
            font-size: 1.35rem;
            cursor: pointer;
            padding: 0.2rem 0.1rem;
            border-radius: 4px;
            border: 2px solid transparent;
            transition: border-color 0.15s, transform 0.15s;
            line-height: 1;
            user-select: none;
        }
        .mood-label:hover { transform: scale(1.15); }
        .mood-option:checked + .mood-label {
            border-color: var(--accent);
            background: rgba(196,92,42,0.08);
        }

        .mood-none-label {
            font-family: var(--mono);
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            cursor: pointer;
            align-self: center;
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--faint);
            transition: color 0.15s;
        }
        .mood-none-label:hover { color: var(--ink); }

        /* ── Utility ── */
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mt-4 { margin-top: 2rem; }
        .gap-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .text-muted { color: var(--muted); font-size: 0.85rem; }
        .text-mono  { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; }
    </style>
</head>
<body>
<div class="container fade-in">
    <nav>
        <a href="/" class="wordmark">Brief<span>.</span></a>
        <div class="gap-row">
            {% if request.cookies.get('username') %}
                <a href="/profile/{{ request.cookies.get('username') }}">my entry</a>
                <a href="/groups">my groups</a>
                <a href="/strangers">strangers</a>
                <a href="/about">about</a>
                <a href="/claim-link">my claim link</a>
            {% else %}
                <a href="/strangers">strangers</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
